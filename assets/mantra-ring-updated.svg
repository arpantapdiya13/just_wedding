<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1000" height="1000" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <title>Mantra Ring</title>
  <defs>
    <path id="mantraCircle"
          d="M 500,500
             m -320,0
             a 320,320 0 1,1 640,0
             a 320,320 0 1,1 -640,0" />
    <style>
      .mantraText {
        font-family: "Noto Serif Devanagari", "Kohinoor Devanagari", "Devanagari Sangam MN", "Nirmala UI", serif;
        font-size: 40px;
        font-weight: 700;
        letter-spacing: 0px;
        word-spacing: 0px;
        fill: #c5a059;
      }
    </style>
  </defs>

  <text class="mantraText" textLength="2010.6" lengthAdjust="spacing">
    <textPath id="ringText" href="#mantraCircle" startOffset="0%">
      ॐ गणेशाय नमः ॐ गणेशाय नमः ॐ गणेशाय नमः ॐ गणेशाय नमः ॐ गणेशाय नमः ॐ गणेशाय नमः ॐ गणेशाय नमः
    </textPath>
  </text>
</svg>
